services:
  - type: web
    name: netsentinel-api
    runtime: docker
    dockerfilePath: ./docker/api.Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: NetSentinel Lab API
      - key: APP_ENV
        value: production
      - key: CORRELATION_WINDOW_HOURS
        value: "24"
      - key: MEDIUM_BURST_THRESHOLD
        value: "3"
      - key: MEDIUM_BURST_WINDOW_MINUTES
        value: "15"
      - key: ATTACK_CHAIN_WINDOW_MINUTES
        value: "10"
      - key: NETSENTINEL_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: netsentinel-db
          property: connectionString

databases:
  - name: netsentinel-db
    plan: free
    databaseName: netsentinel
    user: netsentinel