services:
  db:
    image: postgres:16-alpine
    container_name: netsentinel-db
    environment:
      POSTGRES_DB: netsentinel
      POSTGRES_USER: netsentinel
      POSTGRES_PASSWORD: netsentinel
    ports:
      - "5432:5432"
    volumes:
      - netsentinel_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netsentinel -d netsentinel"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    container_name: netsentinel-api
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  netsentinel_postgres_data: