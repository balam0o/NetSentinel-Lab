name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: netsentinel
          POSTGRES_USER: netsentinel
          POSTGRES_PASSWORD: netsentinel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U netsentinel -d netsentinel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://netsentinel:netsentinel@localhost:5432/netsentinel
      APP_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q